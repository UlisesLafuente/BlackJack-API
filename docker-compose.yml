version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: blackjack_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blackjack
      MYSQL_USER: blackjack
      MYSQL_PASSWORD: blackjack
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackjack_api
    ports:
      - "8080:8080"
    environment:
      DB_URL: r2dbc:mysql://mysql:3306/blackjack
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: dGhpcy1pcy1hLXNlY3VyZS1qd3Qtc2VjcmV0LWtleS1mb3ItYmxhY2tqYWNrLWFwaS1wcm9qZWN0LTI1Ng==
      JWT_EXPIRATION: 86400000
      SERVER_PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: